# Test Configuration
# Este arquivo SOBRESCREVE as configurações do main/resources/application.properties para testes

# Database - Usar H2 (In-Memory) para evitar dependência de Docker/Testcontainers no microserviço
quarkus.datasource.db-kind=h2
quarkus.datasource.username=sa
quarkus.datasource.password=
quarkus.datasource.jdbc.url=jdbc:h2:mem:test;DB_CLOSE_DELAY=-1

# Desabilitar Dev Services (Testcontainers)
quarkus.devservices.enabled=false
quarkus.datasource.devservices.enabled=false
quarkus.oidc.devservices.enabled=false

# Hibernate / Migrations
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.active=true
quarkus.flyway.migrate-at-start=false

# Logging
quarkus.hibernate-orm.log.sql=false

# JWT Configuration for Tests (Seguindo padrão do backend)
jwt.expiration=3600
smallrye.jwt.verify.algorithm=HS256
smallrye.jwt.verify.key.location=secret.jwk
jwt.secret=test-secret-key-for-testing-purposes-only-minimum-256-bits

# App Configuration (Dummy values para satisfazer placeholders do main)
app.webhook.base-url=http://localhost:8085
google.client.id=test-id
google.client.secret=test-secret
google.redirect-uri=http://localhost:8085/callback
telegram.bot.token=test-token
telegram.chat.id=123456789
quarkus.langchain4j.ai.gemini.api-key=test-key
githa.encryption.secret-key=test-encryption-key-32-chars-long
githa.core.url=http://localhost:8080
