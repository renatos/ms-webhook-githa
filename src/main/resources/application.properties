# Application name
quarkus.application.name=ms-webhook-githa

# Database configuration
%prod.quarkus.datasource.jdbc.url=${DB_URL}
%prod.quarkus.datasource.username=${DB_USER}
%prod.quarkus.datasource.password=${DB_PASSWORD}
%prod.quarkus.datasource.devservices.enabled=false
%prod.quarkus.devservices.enabled=false
%dev.quarkus.datasource.jdbc.url=${DB_URL}
%dev.quarkus.datasource.username=${DB_USER}
%dev.quarkus.datasource.password=${DB_PASSWORD}
%dev.quarkus.datasource.devservices.enabled=false
%dev.quarkus.devservices.enabled=false
quarkus.datasource.db-kind=postgresql
quarkus.oidc.devservices.enabled=false




# JPA/Hibernate
quarkus.hibernate-orm.schema-management.strategy=validate
quarkus.hibernate-orm.mapping.format.global=ignore

# Flyway
quarkus.flyway.migrate-at-start=false

# Server configuration
quarkus.http.port=8085

# Virtual Threads Configuration
quarkus.virtual-threads.enabled=true


# JWT Configuration - Using symmetric key (HMAC)
mp.jwt.verify.issuer=githa-backend
smallrye.jwt.verify.algorithm=HS256
smallrye.jwt.verify.key.location=classpath:secret.jwk
smallrye.jwt.sign.key=${JWT_SECRET}
jwt.expiration=86400000
jwt.secret=${JWT_SECRET}


# Localization pt-BR
quarkus.locales=pt-BR
quarkus.default-locale=pt-BR


# Google Integration
quarkus.oidc.enabled=false
mock.login.enabled=${MOCK_LOGIN_ENABLED:false}
quarkus.oidc.provider=google
quarkus.oidc.application-type=web-app
quarkus.oidc.client-id=${google.client.id}
quarkus.oidc.credentials.secret=${google.client.secret}
quarkus.oidc.authentication.scopes=openid,email,profile,https://www.googleapis.com/auth/calendar,https://www.googleapis.com/auth/contacts

google.client.id=${GOOGLE_CLIENT_ID}
google.client.secret=${GOOGLE_CLIENT_SECRET}
google.redirect-uri=${GOOGLE_REDIRECT_URI}

app.webhook.base-url=${APP_WEBHOOK_BASE_URL}

# Telegram Configuration
telegram.bot.token=${TELEGRAM_BOT_TOKEN}
telegram.chat.id=${TELEGRAM_CHAT_ID}

# Telegram REST Client URL
quarkus.rest-client."com.githa.dataprovider.client.telegram.TelegramClient".url=https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}

# AI Integration - LangChain4j (Google AI Studio Gemini)
quarkus.langchain4j.ai.gemini.api-key=${GEMINI_API_KEY}
quarkus.langchain4j.ai.gemini.chat-model.model-id=gemini-flash-lite-latest
quarkus.langchain4j.ai.gemini.chat-model.temperature=0.2
quarkus.langchain4j.ai.gemini.chat-model.max-output-tokens=4096
quarkus.langchain4j.timeout=60s
quarkus.langchain4j.ai.gemini.log-requests=true
quarkus.langchain4j.ai.gemini.log-responses=true


# CORS configuration (if needed for frontend)
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:5173,http://localhost:5174,https://githa-app.duckdns.org
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.exposed-headers=Content-Disposition
quarkus.http.cors.access-control-max-age=24H
quarkus.http.cors.access-control-allow-credentials=true

# Native Build Configuration
quarkus.native.container-build=true
quarkus.native.container-runtime=podman
quarkus.native.additional-build-args=-H:+ReportExceptionStackTraces,--initialize-at-run-time=org.postgresql.sspi.SSPIClient,--initialize-at-run-time=com.google.api.client.auth.oauth2.TokenResponse,--enable-url-protocols=http\\,https


#quarkus.native.additional-build-args=-H:+ReportExceptionStackTraces,--initialize-at-run-time=org.postgresql.sspi.SSPIClient,--initialize-at-run-time=com.google.api.client.auth.oauth2.TokenResponse,--enable-url-protocols=http,https

quarkus.native.resources.includes=secret.jwk

# Encryption keys
githa.encryption.secret-key=${GITHA_ENCRYPTION_KEY}
quarkus.http.proxy.proxy-address-forwarding=true

# Core Backend REST Client
githa.core.url=${GITHA_CORE_URL:http://localhost:8080}
quarkus.rest-client."com.githa.dataprovider.client.core.GithaCoreRestClient".url=${githa.core.url}
