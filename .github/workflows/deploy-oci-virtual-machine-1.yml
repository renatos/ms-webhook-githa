name: Deploy ms-webhook-githa to OCI Virtual Machine 1

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      deployment_type:
        description: 'Tipo de deploy (jvm ou native)'
        required: true
        default: 'jvm'
        type: choice
        options:
          - jvm
          - native

env:
  OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
  OCIR_REGISTRY: ${{ secrets.OCIR_REGISTRY }}
  OCIR_NAMESPACE: ${{ secrets.OCIR_NAMESPACE }}
  IMAGE_NAME: ms-webhook-githa

jobs:
  build-and-push-jvm:
    name: Build and Push JVM Image
    # Executa se for tag (v*) OU se o input for 'jvm'
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.deployment_type == 'jvm')
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-
      
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      
      - name: Generate secret.jwk and JWT_SECRET_B64URL for production
        id: jwt_secret
        run: |
          SECRET_BASE64URL=$(echo -n "${{ secrets.JWT_SECRET }}" | tr '+/' '-_' | tr -d '=')
          echo "SECRET_BASE64URL=${SECRET_BASE64URL}" >> $GITHUB_OUTPUT
          cat > src/main/resources/secret.jwk << EOF
          {
              "kty": "oct",
              "k": "${SECRET_BASE64URL}"
          }
          EOF
      
      - name: Build
        run: ./gradlew build -x test
      
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.OCIR_REGISTRY }}/${{ env.OCIR_NAMESPACE }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=prod-
            latest
      
      - name: Login to OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.OCIR_REGISTRY }}
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCI_AUTH_TOKEN }}
      
      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/main/docker/Dockerfile.jvm
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          platforms: linux/arm64
          cache-from: type=registry,ref=${{ env.OCIR_REGISTRY }}/${{ env.OCIR_NAMESPACE }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.OCIR_REGISTRY }}/${{ env.OCIR_NAMESPACE }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  deploy-jvm-to-vm:
    name: Deploy JVM to VM
    runs-on: ubuntu-latest
    needs: build-and-push-jvm
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.deployment_type == 'jvm')
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy docker-compose to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ubuntu
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          source: "docker-compose.prod.yml"
          target: "/opt/ms-webhook-githa/"

      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.0
        env:
          OCIR_REGISTRY: ${{ env.OCIR_REGISTRY }}
          OCIR_NAMESPACE: ${{ env.OCIR_NAMESPACE }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ubuntu
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          port: 22
          envs: OCIR_REGISTRY,OCIR_NAMESPACE,IMAGE_NAME
          script: |
            cd /opt/ms-webhook-githa
            mv -f docker-compose.prod.yml docker-compose.yml
            echo "${{ secrets.OCI_AUTH_TOKEN }}" | docker login ${{ env.OCIR_REGISTRY }} -u '${{ secrets.OCIR_USERNAME }}' --password-stdin
            IMAGE_TAG="${OCIR_REGISTRY}/${OCIR_NAMESPACE}/${IMAGE_NAME}:latest"
            docker pull $IMAGE_TAG
            
            JWT_SECRET_B64URL=$(echo -n "${{ secrets.JWT_SECRET }}" | tr '+/' '-_' | tr -d '=')
            cat <<EOF > .env
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${JWT_SECRET_B64URL}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }}
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
            APP_WEBHOOK_BASE_URL=${{ secrets.APP_WEBHOOK_BASE_URL }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            GITHA_ENCRYPTION_KEY=${{ secrets.GITHA_ENCRYPTION_KEY }}
            GITHA_CORE_URL=http://githa-backend:8080
            OCIR_REGISTRY=${{ env.OCIR_REGISTRY }}
            OCIR_NAMESPACE=${{ env.OCIR_NAMESPACE }}
            EOF
            sed -i "s|image:.*ms-webhook-githa:.*|image: $IMAGE_TAG|" docker-compose.yml
            docker compose up -d
            docker image prune -f

  deploy-native-to-vm:
    name: Deploy Native to VM (Manual Build on VM)
    # Executa APENAS se o input for 'native'
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deployment_type == 'native'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Copy source to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ubuntu
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          source: "./*"
          target: "/opt/ms-webhook-githa/source"
          rm: true
      - name: Build and Deploy Native via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ubuntu
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Source SDKMAN to get Java (Gradle needs it for the wrapper)
            export SDKMAN_DIR="$HOME/.sdkman"
            [[ -s "$SDKMAN_DIR/bin/sdkman-init.sh" ]] && source "$SDKMAN_DIR/bin/sdkman-init.sh"
            
            cd /opt/ms-webhook-githa/source
            
            JWT_SECRET_B64URL=$(echo -n "${{ secrets.JWT_SECRET }}" | tr '+/' '-_' | tr -d '=')
            cat <<EOF > /opt/ms-webhook-githa/.env
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${JWT_SECRET_B64URL}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }}
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
            APP_WEBHOOK_BASE_URL=${{ secrets.APP_WEBHOOK_BASE_URL }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            GITHA_ENCRYPTION_KEY=${{ secrets.GITHA_ENCRYPTION_KEY }}
            GITHA_CORE_URL=http://githa-backend:8080
            OCIR_REGISTRY=${{ env.OCIR_REGISTRY }}
            OCIR_NAMESPACE=${{ env.OCIR_NAMESPACE }}
            EOF
            
            # Gerar secret.jwk para o processo de build nativo (Quarkus incorpora no binário)
            cat <<EOF > src/main/resources/secret.jwk
            {
                "kty": "oct",
                "k": "${JWT_SECRET_B64URL}"
            }
            EOF
            
            # Copiar docker-compose.native.yml para o nível superior
            cp docker-compose.native.yml /opt/ms-webhook-githa/docker-compose.native.yml
            
            # Executar script de build (que agora está em /opt/ms-webhook-githa/source/build-native.sh)
            chmod +x build-native.sh
            ./build-native.sh
