name: Deploy ms-webhook-githa to OCI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      deployment_type:
        description: 'Tipo de deploy (jvm ou native)'
        required: true
        default: 'native'
        type: choice
        options:
          - jvm
          - native

env:
  OCI_CLI_REGION: ${{ secrets.OCI_CLI_REGION }}
  OCIR_REGISTRY: ${{ secrets.OCIR_REGISTRY }}
  OCIR_NAMESPACE: ${{ secrets.OCIR_NAMESPACE }}
  IMAGE_NAME: ms-webhook-githa

jobs:
  build-and-push-jvm:
    name: Build and Push JVM Image
    if: (github.event_name == 'push' && contains(github.ref, 'ms-webhook')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.deployment_type == 'jvm')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - uses: gradle/actions/setup-gradle@v3
      - name: Build
        run: ./gradlew build -x test
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.OCIR_REGISTRY }}
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCI_AUTH_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: src/main/docker/Dockerfile.jvm
          push: true
          tags: ${{ env.OCIR_REGISTRY }}/${{ env.OCIR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
          platforms: linux/amd64

  deploy-native-to-vm:
    name: Deploy Native to VM (Via SSH Build)
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || (github.event_name == 'workflow_dispatch' && github.event.inputs.deployment_type == 'native')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copy source to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ubuntu
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          source: "./*"
          target: "/opt/ms-webhook-githa/source"
          rm: true
      - name: Build and Deploy Native via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ubuntu
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          script: |
            set -e
            export SDKMAN_DIR="$HOME/.sdkman"
            [[ -s "$SDKMAN_DIR/bin/sdkman-init.sh" ]] && source "$SDKMAN_DIR/bin/sdkman-init.sh"
            
            cd /opt/ms-webhook-githa/source
            
            # Debug: List context to verify files
            echo "Verifying files in /opt/ms-webhook-githa/source:"
            ls -la
            
            # Setup environment (Sharing same secrets as backend)
            JWT_SECRET_B64URL=$(echo -n "${{ secrets.JWT_SECRET }}" | tr '+/' '-_' | tr -d '=')
            cat <<EOF > /opt/ms-webhook-githa/.env
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${JWT_SECRET_B64URL}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GOOGLE_REDIRECT_URI=${{ secrets.GOOGLE_REDIRECT_URI }}
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
            APP_WEBHOOK_BASE_URL=${{ secrets.APP_WEBHOOK_BASE_URL }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            GITHA_ENCRYPTION_KEY=${{ secrets.GITHA_ENCRYPTION_KEY }}
            GITHA_CORE_URL=http://githa-backend:8080
            EOF
            
            # JWK generation for native build
            cat <<EOF > src/main/resources/secret.jwk
            {
                "kty": "oct",
                "k": "${JWT_SECRET_B64URL}"
            }
            EOF
            
            echo "Copying docker-compose.native.yml to root..."
            cp -f docker-compose.native.yml /opt/ms-webhook-githa/docker-compose.native.yml
            
            chmod +x build-native.sh
            ./build-native.sh
